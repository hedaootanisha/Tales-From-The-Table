<!DOCTYPE html>
<html lang="en">
<head>

<body>

  <section class="cafe-container" id="cafeList">

  <script>
    // Simulated fetch (replace with real fetch from backend)
    const cafes = [
  { name: "Mokai", image: "images/mokai.png", link: "https://g.co/kgs/BYPKT2t" },
  { name: "70 Beans", image: "images/beans.png", link: "https://g.co/kgs/JimzKyc" },

  { name: "Bites & Brew", image: "images/bitesnbrew.png", link: "https://g.co/kgs/UpVVgJ3" },
  { name: "Blue Tokai", image: "images/blue.png", link: "https://g.co/kgs/DLsn3Ae" },
  { name: "Brew House Cafe", image: "images/brew.png", link: "https://g.co/kgs/TaCfucb" },
  { name: "Coffee By Di Bella", image: "images/cbdb.png", link: "https://g.co/kgs/TLAoz38" },

];


    const cafeList = document.getElementById('cafeList');
    cafes.forEach(cafe => {
      const card = document.createElement('div');
      card.className = 'cafe-card';
      card.innerHTML = `
        <a href="${cafe.link}" target="_blank">
          <img src="${cafe.image}" alt="${cafe.name}" />
          <h3>${cafe.name}</h3>
        </a>
      `;
      cafeList.appendChild(card);
    });
  </script>
</body>
